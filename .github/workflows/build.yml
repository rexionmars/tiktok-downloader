name: Build Multi-Platform

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  APP_NAME: TikTokDownloaderDesktop

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build
        run: wails build -platform windows/amd64
      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: build/bin/${{ env.APP_NAME }}.exe
          retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build
        run: wails build -platform darwin/universal
      - name: Create DMG
        run: |
          mkdir -p dist
          hdiutil create -volname "${{ env.APP_NAME }}" \
            -srcfolder "build/bin/${{ env.APP_NAME }}.app" \
            -ov -format UDZO "dist/${{ env.APP_NAME }}.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-portable
          path: dist/${{ env.APP_NAME }}.dmg
          retention-days: 7

  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo ln -sf /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.1.pc \
            /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4.0.pc
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.10.1
      - name: Build
        run: wails build -platform linux/amd64
      - uses: actions/upload-artifact@v4
        with:
          name: linux-portable
          path: build/bin/${{ env.APP_NAME }}
          retention-days: 7

  create-release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/windows-portable/${{ env.APP_NAME }}.exe
            artifacts/macos-portable/${{ env.APP_NAME }}.dmg
            artifacts/linux-portable/${{ env.APP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
